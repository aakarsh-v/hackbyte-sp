services:
  spacetime:
    image: clockworklabs/spacetime:latest
    container_name: spacetime
    command: ["start", "--listen-addr", "0.0.0.0:3000", "--non-interactive"]
    ports:
      - "3004:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/v1/ping >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  st-init:
    image: clockworklabs/spacetime:latest
    depends_on:
      spacetime:
        condition: service_healthy
    volumes:
      - ../spacetimedb/devops-module:/module
    working_dir: /module
    environment:
      SPACETIME_DATABASE: ${SPACETIME_DATABASE:-devopsai}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "exec spacetime publish $$SPACETIME_DATABASE -s http://spacetime:3000 -y"
    restart: "no"

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8080"
    environment:
      LOG_INGEST_URL: http://backend:8000/ingest

  payment-service:
    build:
      context: ../services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8082:8080"
    environment:
      LOG_INGEST_URL: http://backend:8000/ingest
      FAIL_MODE: "0"

  frontend-service:
    build:
      context: ../services/frontend-service
      dockerfile: Dockerfile
    container_name: frontend-service
    ports:
      - "3001:8080"
    environment:
      LOG_INGEST_URL: http://backend:8000/ingest

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: backend
    depends_on:
      st-init:
        condition: service_completed_successfully
      spacetime:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SPACETIME_HTTP_URL: ${SPACETIME_HTTP_URL:-http://spacetime:3000}
      SPACETIME_DATABASE: ${SPACETIME_DATABASE:-devopsai}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      ALLOW_DOCKER_EXEC: ${ALLOW_DOCKER_EXEC:-true}
      LOG_BUFFER_MAX: ${LOG_BUFFER_MAX:-2000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:3001}

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
